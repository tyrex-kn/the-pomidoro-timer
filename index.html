<html lang="en">
<head>

    <title>Tomatos</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body>
    <div class="tomato">
        <div class="timer" id="timer">
            <div class="timer-display" ><span id="display">30:00</span></div>
            <div class="button-section">
                <button id="btn-start" onclick="startTimer()"><img src="assets/play.svg" alt="Start"></button>
                <button id="btn-stop" class="hide" onclick="stopTimer()"><img src="assets/stop.svg" alt="stop"></button>
                <button class="hide" id="btn-reset" onclick="resetTimer()">RESET</button>
            </div>
        </div>
        <img src="assets/green.svg"  id="green" alt="green">
        <svg id="red" data-name="red" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 171.37 154.02">
